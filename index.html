<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA BRUTAL // V3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="side-logo">BRUTAL_LABS</div>
            <nav class="user-nav">
                <button onclick="mudarAba('Eduardo')" id="side-eduardo" class="nav-item active">
                    <span class="icon">👤</span> EDUARDO
                </button>
                <button onclick="mudarAba('Nadia')" id="side-nadia" class="nav-item">
                    <span class="icon">👤</span> NÁDIA
                </button>
            </nav>
            <div class="side-footer">v3.0.42_STABLE</div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="indicator">MODO_OPERACIONAL // <span id="display-user">EDUARDO</span></div>
            </header>

            <div class="dashboard-grid">
                <section class="card search-card">
                    <div class="card-header">VARREDURA_BASE</div>
                    <input type="text" id="busca" placeholder="O QUE VOCÊ COMEU?" autocomplete="off">
                    <div id="resultados" class="food-results"></div>
                </section>

                <section class="card status-card">
                    <div class="card-header">BIOMETRIA_DIÁRIA</div>
                    <div class="weight-row">
                        <input type="number" id="input-peso" step="0.1" placeholder="PESO">
                        <button onclick="salvarPeso()" class="btn-green">GRAVAR</button>
                    </div>
                    
                    <div class="macros-display">
                        <div class="macro-box">
                            <span class="val" id="total-kcal">0</span>
                            <span class="lab">KCAL_HOJE</span>
                        </div>
                        <div class="macro-box">
                            <span class="val" id="total-prot">0</span>
                            <span class="lab">PROT_HOJE</span>
                        </div>
                    </div>

                    <div class="chart-wrapper">
                        <canvas id="graficoPeso"></canvas>
                    </div>

                    <div class="card-header">LOG_DE_CONSUMO</div>
                    <div id="logs-usuario" class="logs-container"></div>
                </section>
            </div>
        </main>

        <div id="modal-porcao" class="modal">
            <div class="modal-box">
                <h2 id="m-nome">---</h2>
                <div class="portion-control">
                    <button class="btn-step" onclick="alterarQtd(-10)">-</button>
                    <div class="qtd-display">
                        <span id="display-qtd">100</span>
                        <small id="unidade-label">g</small>
                    </div>
                    <button class="btn-step" onclick="alterarQtd(10)">+</button>
                </div>
                <div class="modal-actions">
                    <button class="btn-confirm" onclick="confirmarConsumo()">CONFIRMAR_REGISTRO</button>
                    <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
