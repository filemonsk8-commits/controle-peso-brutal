<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL // PESO BRUTAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">SISTEMA_UNITÁRIO_v2.5</div>
            <div class="tabs-control">
                <button class="tab-btn active" id="tab-eduardo" onclick="mudarAba('Eduardo')">EDUARDO</button>
                <button class="tab-btn" id="tab-nadia" onclick="mudarAba('Nadia')">NÁDIA</button>
            </div>
        </header>

        <div id="modal-porcao" class="modal">
            <div class="modal-content">
                <h3 id="modal-nome-alimento">---</h3>
                <p>CÁLCULO PROPORCIONAL (BASE 100g/un)</p>
                <input type="number" id="input-qtd" placeholder="QTD (ex: 150 ou 2)">
                <div class="modal-buttons">
                    <button onclick="confirmarConsumo()" class="btn-save">ADICIONAR</button>
                    <button onclick="fecharModal()" class="btn-cancel">CANCELAR</button>
                </div>
            </div>
        </div>

        <main class="main-layout">
            <section class="panel-search">
                <div class="panel-header">VARREDURA_BASE_DADOS</div>
                <input type="text" id="busca" placeholder="BUSCAR ALIMENTO..." autocomplete="off">
                <div id="resultados" class="list-container"></div>
            </section>

            <section class="panel-data">
                <div class="panel-header">PAINEL_DE_CONTROLE // <span id="display-aba">EDUARDO</span></div>
                
                <div class="biometria-row">
                    <input type="number" id="input-peso" step="0.1" placeholder="PESO kg">
                    <button onclick="salvarPeso()" class="btn-action">GRAVAR_PESO</button>
                </div>
                
                <div class="chart-box">
                    <canvas id="graficoPeso"></canvas>
                </div>

                <div class="status-bar">
                    <div class="status-item">KCAL: <span id="total-kcal">0</span></div>
                    <div class="status-item">PROT: <span id="total-prot">0</span>g</div>
                </div>

                <div id="logs-usuario" class="list-container log-list"></div>
            </section>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
